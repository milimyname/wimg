<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover, interactive-widget=resizes-content"
    />
    <meta name="theme-color" content="#4361ee" />
    <meta name="description" content="Local-first personal finance tracker" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="wimg" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <link rel="icon" type="image/png" sizes="192x192" href="/icon-192.png" />
    <link rel="apple-touch-icon" href="/icon-192.png" />
    <script>
      // Dark mode flash prevention — runs before CSS/JS load
      (function () {
        var t = localStorage.getItem("wimg_theme");
        var dark =
          t === "dark" || (t !== "light" && matchMedia("(prefers-color-scheme: dark)").matches);
        if (dark) document.documentElement.classList.add("dark");
      })();
    </script>
    <style>
      /* Prevent FOUC: hide body briefly, fade in once CSS + JS are loaded */
      body {
        opacity: 0;
        background: #faf9f6;
      }
      html.dark body {
        background: #111114;
      }
      body.ready {
        opacity: 1;
        transition: opacity 0.1s ease;
      }
    </style>
    %sveltekit.head%
  </head>
  <body data-sveltekit-preload-data="hover">
    <div style="display: contents">%sveltekit.body%</div>
  </body>
</html>
