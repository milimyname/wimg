name: wimg
options:
  bundleIdPrefix: com.wimg
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16.0"
  defaultConfig: Release
settings:
  base:
    SWIFT_EMIT_LOC_STRINGS: "YES"
localizations:
  - de
  - en

targets:
  wimg:
    type: application
    platform: iOS
    sources:
      - path: wimg
        excludes:
          - "**/.DS_Store"
    settings:
      base:
        SWIFT_VERSION: "5.10"
        PRODUCT_BUNDLE_IDENTIFIER: com.wimg.app
        MARKETING_VERSION: "0.6.23"
        CURRENT_PROJECT_VERSION: 1
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        CODE_SIGN_IDENTITY: "Apple Development"
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: W5N395VNYH
        SWIFT_OBJC_BRIDGING_HEADER: "wimg/wimg-Bridging-Header.h"
        FRAMEWORK_SEARCH_PATHS:
          - "$(inherited)"
          - '"Frameworks"'
        HEADER_SEARCH_PATHS:
          - "$(inherited)"
          - "$(PROJECT_DIR)/Frameworks/libwimg.xcframework/ios-arm64/Headers"
          - "$(PROJECT_DIR)/Frameworks/libwimg.xcframework/ios-arm64-simulator/Headers"
        LD_RUNPATH_SEARCH_PATHS:
          - "$(inherited)"
          - "@executable_path/Frameworks"
    dependencies:
      - framework: Frameworks/libwimg.xcframework
        embed: false
    info:
      path: wimg/Info.plist
      properties:
        UILaunchScreen: {}
        ITSAppUsesNonExemptEncryption: false
        CFBundleDisplayName: wimg
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
