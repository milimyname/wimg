name: wimg
options:
  bundleIdPrefix: com.wimg
  deploymentTarget:
    iOS: "17.0"

targets:
  wimg:
    type: application
    platform: iOS
    sources:
      - path: wimg
    settings:
      base:
        SWIFT_VERSION: "5.10"
        PRODUCT_BUNDLE_IDENTIFIER: com.wimg.app
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: 1
        SWIFT_OBJC_BRIDGING_HEADER: "wimg/wimg-Bridging-Header.h"
        HEADER_SEARCH_PATHS:
          - "$(inherited)"
          - "$(PROJECT_DIR)/Frameworks/libwimg.xcframework/ios-arm64/Headers"
          - "$(PROJECT_DIR)/Frameworks/libwimg.xcframework/ios-arm64-simulator/Headers"
    dependencies:
      - framework: Frameworks/libwimg.xcframework
    info:
      path: wimg/Info.plist
      properties:
        UILaunchScreen: {}
        CFBundleDisplayName: wimg
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
