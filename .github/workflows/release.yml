      #
      # - name: Upload to TestFlight
      #   env:
      #     ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
      #     ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
      #     ASC_KEY_CONTENT: ${{ secrets.ASC_KEY_CONTENT }}
      #   run: |
      #     mkdir -p ~/.appstoreconnect
      #     echo "$ASC_KEY_CONTENT" > ~/.appstoreconnect/key.p8
      #     xcrun altool --upload-app \
      #       --type ios \
      #       --file build/export/wimg.ipa \
      #       --apiKey "$ASC_KEY_ID" \
      #       --apiIssuer "$ASC_ISSUER_ID"

  deploy-sync:
    needs: [check, build-and-deploy-web]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: oven-sh/setup-bun@v2

      - name: Download WASM artifacts
        uses: actions/download-artifact@v8
        with:
          name: libwimg-wasm
          path: .

      - name: Install dependencies
        working-directory: wimg-sync
        run: bun install --frozen-lockfile

      - name: Deploy Worker
        working-directory: wimg-sync
        run: bunx wrangler deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

  release:
    needs: [build-and-deploy-web, build-ios]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Download all artifacts
        uses: actions/download-artifact@v8
        with:
          path: artifacts

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG=${GITHUB_REF#refs/tags/}

          # Find the last tag that has a GitHub release (skips failed CI tags)
          PREV_TAG=""
          for t in $(git tag -l --sort=-v:refname | tail -n +2); do
            if gh release view "$t" --json tagName >/dev/null 2>&1; then
              PREV_TAG="$t"
              break
            fi
          done

          if [ -n "$PREV_TAG" ]; then
            NOTES=$(git log --pretty=format:"- %s" "$PREV_TAG"..HEAD \
              | grep -vE '^- (release|chore|ci|build): ' || echo "- Version bump")
          else
            NOTES=$(git log --pretty=format:"- %s" HEAD~20..HEAD \
              | grep -vE '^- (release|chore|ci|build): ' || echo "- Version bump")
          fi

          echo "$NOTES" > release-notes.md

          gh release create "$TAG" \
            --title "$TAG" \
            --notes-file release-notes.md \
            artifacts/libwimg-wasm/wimg-web/static/libwimg.wasm \
            artifacts/libwimg-ios/libwimg.xcframework.zip
