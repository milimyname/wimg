name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: mlugg/setup-zig@v2
        with:
          version: 0.15.2

      - uses: oven-sh/setup-bun@v2

      - name: Download SQLite amalgamation
        working-directory: libwimg/vendor
        run: |
          curl -fsSL https://www.sqlite.org/2024/sqlite-amalgamation-3470200.zip -o sqlite.zip
          unzip -o sqlite.zip
          cp sqlite-amalgamation-3470200/sqlite3.c sqlite3.c
          cp sqlite-amalgamation-3470200/sqlite3.h sqlite3.h

      - name: Zig fmt check
        working-directory: libwimg
        run: zig fmt --check src/

      - name: Zig tests
        working-directory: libwimg
        run: zig build test

      - name: Install web dependencies
        working-directory: wimg-web
        run: bun install --frozen-lockfile

      - name: oxfmt check
        working-directory: wimg-web
        run: bunx oxfmt --check

      - name: oxlint
        working-directory: wimg-web
        run: bunx oxlint

      - name: svelte-check
        working-directory: wimg-web
        run: bun run check

      - name: Install sync dependencies
        working-directory: wimg-sync
        run: bun install --frozen-lockfile

      - name: Typecheck sync worker
        working-directory: wimg-sync
        run: bunx tsc --noEmit

  build-and-deploy-web:
    needs: check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: mlugg/setup-zig@v2
        with:
          version: 0.15.2

      - uses: oven-sh/setup-bun@v2

      - name: Download SQLite amalgamation
        working-directory: libwimg/vendor
        run: |
          curl -fsSL https://www.sqlite.org/2024/sqlite-amalgamation-3470200.zip -o sqlite.zip
          unzip -o sqlite.zip
          cp sqlite-amalgamation-3470200/sqlite3.c sqlite3.c
          cp sqlite-amalgamation-3470200/sqlite3.h sqlite3.h

      - name: Build WASM
        run: ./scripts/build-wasm.sh

      - name: Upload WASM artifact
        uses: actions/upload-artifact@v4
        with:
          name: libwimg-wasm
          path: wimg-web/static/libwimg.wasm

      - name: Install web dependencies
        working-directory: wimg-web
        run: bun install --frozen-lockfile

      - name: Build web
        working-directory: wimg-web
        run: bun run build

      - name: Deploy to Cloudflare Pages
        working-directory: wimg-web
        run: bunx wrangler pages deploy .svelte-kit/cloudflare --project-name wimg-web --branch main
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

  build-ios:
    needs: check
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: mlugg/setup-zig@v2
        with:
          version: 0.15.2

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Download SQLite amalgamation
        working-directory: libwimg/vendor
        run: |
          curl -fsSL https://www.sqlite.org/2024/sqlite-amalgamation-3470200.zip -o sqlite.zip
          unzip -o sqlite.zip
          cp sqlite-amalgamation-3470200/sqlite3.c sqlite3.c
          cp sqlite-amalgamation-3470200/sqlite3.h sqlite3.h

      - name: Build iOS XCFramework
        run: ./scripts/build-ios.sh

      - name: Generate Xcode project
        run: ./scripts/gen-xcodeproj.sh

      - name: Zip XCFramework
        working-directory: libwimg/build-ios
        run: zip -r libwimg.xcframework.zip libwimg.xcframework

      - name: Upload iOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: libwimg-ios
          path: libwimg/build-ios/libwimg.xcframework.zip

  deploy-sync:
    needs: [check, build-and-deploy-web]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2

      - name: Download WASM artifact
        uses: actions/download-artifact@v4
        with:
          name: libwimg-wasm
          path: wimg-web/static

      - name: Install dependencies
        working-directory: wimg-sync
        run: bun install --frozen-lockfile

      - name: Deploy Worker
        working-directory: wimg-sync
        run: bunx wrangler deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

  release:
    needs: [build-and-deploy-web, build-ios]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG=${GITHUB_REF#refs/tags/}

          PREV_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
          if [ -n "$PREV_TAG" ]; then
            NOTES=$(git log --pretty=format:"- %s" "$PREV_TAG"..HEAD)
          else
            NOTES=$(git log --pretty=format:"- %s" HEAD~20..HEAD)
          fi

          echo "$NOTES" > release-notes.md

          gh release create "$TAG" \
            --title "$TAG" \
            --notes-file release-notes.md \
            artifacts/libwimg-wasm/libwimg.wasm \
            artifacts/libwimg-ios/libwimg.xcframework.zip
