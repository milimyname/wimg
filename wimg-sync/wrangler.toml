name = "wimg-sync"
main = "src/index.ts"
compatibility_date = "2025-03-12"

[[r2_buckets]]
binding = "BUCKET"
bucket_name = "wimg-sync"

[durable_objects]
bindings = [
  { name = "SYNC_ROOM", class_name = "SyncRoom" },
  { name = "MCP_SESSION", class_name = "McpSession" },
]

[[migrations]]
tag = "v1"
new_sqlite_classes = ["SyncRoom"]

[[migrations]]
tag = "v2"
new_sqlite_classes = ["McpSession"]

# FEEDBACK_GITHUB_TOKEN — set via `wrangler secret put FEEDBACK_GITHUB_TOKEN`
# Used by POST /feedback to create GitHub Issues

# Bundle WASM binary with the Worker
[[rules]]
type = "CompiledWasm"
globs = ["**/*.wasm"]
fallthrough = false
