name = "wimg-sync"
main = "src/index.ts"
compatibility_date = "2026-05-17"
compatibility_flags = ["nodejs_compat"]

# Code Mode: Dynamic Worker isolates for sandboxed LLM-generated code execution.
# Required by @cloudflare/codemode's DynamicWorkerExecutor. Must come before
# any [section] header to be parsed as a top-level key, hence the [[...]] form.
[[worker_loaders]]
binding = "LOADER"

[durable_objects]
bindings = [
  { name = "SYNC_ROOM", class_name = "SyncRoom" },
  { name = "MCP_SESSION", class_name = "McpSession" },
]

[[migrations]]
tag = "v1"
new_sqlite_classes = ["SyncRoom"]

[[migrations]]
tag = "v2"
new_sqlite_classes = ["McpSession"]

# FEEDBACK_GITHUB_TOKEN — set via `wrangler secret put FEEDBACK_GITHUB_TOKEN`
# Used by POST /feedback to create GitHub Issues

# Bundle WASM binary with the Worker
[[rules]]
type = "CompiledWasm"
globs = ["**/*.wasm"]
fallthrough = false
