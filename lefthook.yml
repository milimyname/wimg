pre-commit:
  parallel: true
  commands:
    zig-fmt:
      root: libwimg/
      glob: "*.zig"
      run: zig fmt --check src/

    web-fmt:
      root: wimg-web/
      glob: "*.{ts,svelte,js,css,html}"
      run: bunx oxfmt --check

    web-lint:
      root: wimg-web/
      glob: "*.{ts,svelte,js}"
      run: bunx oxlint
